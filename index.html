<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo de la Pr&oacute;stata</title>
    <!-- Favicon -->
    <link rel="icon" href="images/sintomas.jpg" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-wrapper">
        <!-- Progress Bar Header -->
        <header id="quiz-header" class="hidden">
            <button id="back-btn" class="header-btn" title="Atr&aacute;s">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-text">0%</div>
        </header>

        <!-- Main Container for steps -->
        <main id="quiz-container">
            <!-- Active Step will be injected here -->
            <div class="welcome-screen">
                <div class="loader-spinner"></div>
                <p>Cargando el protocolo...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer id="quiz-footer">
            <p>&copy; 2026 Protocolo de la Pr&oacute;stata. Todos los derechos reservados.</p>
        </footer>
    </div>

    <!-- Quiz Data -->
    <script src="quiz_data.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
